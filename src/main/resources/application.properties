# Server
server.port=8080

spring.application.name=dzdp_analysis


# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/dianping_system?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - ???MySQL???????Hive
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ??Hibernate?????????
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# HDFS
hadoop.hdfs.uri=hdfs://192.168.137.129:9820
hadoop.hdfs.user=root
hadoop.hdfs.raw-data-path=/dianping/data/raw

# Hive
hive.jdbc.url=jdbc:hive2://192.168.137.129:10000/default
hive.jdbc.username=hive
hive.jdbc.password=""
hive.database=dianping
hive.ods-table=ods_raw_reviews
hive.dwd-table=dwd_cleaned_reviews
hive.dws-table=dws_merchant_analysis
hive.execution.engine=tez
hive.connection.pool.size=5

#?tez??
tez.queue.name=default
tez.am.resource.memory.mb=2048
tez.am.java.opts=-Xmx1638m
tez.task.resource.memory.mb=1024

# ??????
hive.query.timeout=3600
hive.connection.timeout=30000

# ?????
async.executor.core-pool-size=5
async.executor.max-pool-size=10
async.executor.queue-capacity=100


# File upload
spring.servlet.multipart.max-file-size=10GB
spring.servlet.multipart.max-request-size=10GB

# Logging
logging.level.org.example.dzdp_analysis=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JSP
server.servlet.jsp.enabled=false
server.servlet.jsp.registered=false

# JWT
jwt.secret=yourSuperSecretKeyForJWTTokenGenerationChangeThisInProduction
jwt.expiration=86400000

# admin
spring.sql.init.mode=always